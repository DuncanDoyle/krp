apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: api-example-com
  namespace: kgateway-system
  labels:
    app: apis
spec:
  parentRefs:
    - name: gw
      namespace: kgateway-system
  hostnames:
    - "api.example.com"
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/v1/users
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          # Rewrite to httpbin's /get endpoint since the exact path doesn't exist on the backend
          replaceFullPath: /get
    backendRefs:
    - name: httpbin
      namespace: httpbin
      port: 8000
