  - protocol: HTTP
    port: 80
    name: http-keycloak
    hostname: keycloak.example.com
    allowedRoutes:
      namespaces:
        # from: Same
        # from: All
        from: Selector # Only allow routes from namespaces with the following label set.
        selector:
          matchLabels:
            shared-gateway-access: "true"
      kinds:
      - kind: HTTPRoute
  - protocol: HTTP
    port: 80
    name: http-lambda
    hostname: lambda.example.com
    allowedRoutes:
      namespaces:
        from: Selector # Only allow routes from namespaces with the following label set.
        selector:
          matchLabels:
            shared-gateway-access: "true"
      kinds:
      - kind: HTTPRoute
