    port: 80
    name: http-api
    hostname: api.example.com
    allowedRoutes:
      namespaces:
        # from: Same
        # from: All
        from: Selector # Only allow routes from namespaces with the following label set.
        selector:
          matchLabels:
            shared-gateway-access: "true"
      kinds:
      - kind: HTTPRoute
      # Define which kinds of routes we accept
      # kinds:
