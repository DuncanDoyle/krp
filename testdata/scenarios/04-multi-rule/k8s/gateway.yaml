kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: gw
  namespace: ingress-gw
spec:
  # addresses:
  # - type: IPAddress
  #   value: 172.21.0.51
  allowedListeners:
    namespaces:
      from: All
  gatewayClassName: enterprise-kgateway
  # ddoyle: GlooGatewayParameters configured on GatewayClass
