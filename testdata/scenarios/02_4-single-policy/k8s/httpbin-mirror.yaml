# Second httpbin instance used as the mirror (shadow) backend.
# Deployed in the same httpbin namespace as the primary, under a different name.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: httpbin-mirror
  namespace: httpbin
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-mirror
  namespace: httpbin
  labels:
    app: httpbin-mirror
    service: httpbin-mirror
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8080
  selector:
    app: httpbin-mirror
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-mirror
  namespace: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin-mirror
      version: v1
  template:
    metadata:
      labels:
        app: httpbin-mirror
        version: v1
    spec:
      serviceAccountName: httpbin-mirror
      containers:
        - name: httpbin
          image: docker.io/mccutchen/go-httpbin:v2.6.0
          imagePullPolicy: IfNotPresent
          command: [ go-httpbin ]
          args:
            - "-port"
            - "8080"
            - "-max-duration"
            - "600s"
          ports:
            - containerPort: 8080
